name: Daily Activity Commit

on:
  schedule:
    - cron: '23 2 * * *'  # 10:23 AM Manila (UTC+8)
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update last-active date
        run: echo -n "$(date +%Y-%m-%d)" > public/last-active.txt

      - name: Commit and push
        run: |
          git config user.name "reymartlouie"
          git config user.email "reymartlouie@users.noreply.github.com"
          git add public/last-active.txt
          git diff --cached --quiet || git commit -m "chore: daily activity update $(date +%Y-%m-%d)"
          git push
